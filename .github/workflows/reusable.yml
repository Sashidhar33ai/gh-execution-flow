name: Reusable deploy
on: 
    workflow_call:
      inputs:
        artifact-name:
          description: 'Name of the displayable artifact files'
          required: false
          default: 'dist'
          type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/upload-artifact@v4
        with:
          name: ${{inputs.artifact-name}}
      - name: list files
        run: ls -R
        
      - name: Output Information
        run: echo "Deploying & Uploading..."

