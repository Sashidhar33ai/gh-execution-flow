name: Reusable deploy
on: 
    workflow_call:
      inputs:
        artifact-name:
          description: 'Name of the displayable artifact files'
          required: false
          default: 'dist'
          type: string
      outputs:
        result:
          description: 'The result of the deployment operatoin'
          value: ${{ jobs.deploy.outputs.outcome }}
      #secrets:
       # some-secret:
        #  required: false
jobs:
  deploy:
    outputs:
      outcome: ${{ steps.set-result.outputs.step-result }}
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v4
        with:
          name: ${{inputs.artifact-name}}
      - name: list files
        run: ls -R
        
      - name: Output Information
        run: echo "Deploying & Uploading..."
      - name: See result output
        id: set-result
        run: echo "step-result=success" >> $GITHUB_OUTPUT
