name: Matrix Demo
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    strategy:
      matrix:
        node-version: [18, 20]
        operation-system: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.operation-system }}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
        working-directory: ./01 Starting Project
      - name: Build Project
        run: npm run build
        working-directory: ./01 Starting Project